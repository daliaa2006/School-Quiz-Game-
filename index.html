<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مسابقة الأذكياء 🧠</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 450px;
            text-align: center;
            border: 2px solid #3498db;
        }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        .question { font-size: 1.4rem; margin-bottom: 25px; color: #34495e; font-weight: bold; }
        .options-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #3498db;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .options-btn:hover { background-color: #ebf5fb; }
        .correct { background-color: #27ae60 !important; color: white; border-color: #27ae60; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #e74c3c; }
        
        #next-btn {
            display: none;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        #result { font-weight: bold; margin-top: 15px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz">
    <h2>مسابقة الأذكياء 🏆</h2>
    <div id="question-box">
        <p class="question" id="q-text">جاري التحميل...</p>
        <div id="options-box"></div>
    </div>
    <div id="result"></div>
    <button id="next-btn" onclick="nextQuestion()">السؤال التالي ⬅️</button>
</div>

<script>
    const quizData = [
        {
            question: "ما هي عاصمة المملكة العربية السعودية؟ 🇸🇦",
            options: ["مكة المكرمة", "الرياض", "المدينة المنورة"],
            correct: 1
        },
        {
            question: "كم ناتج جمع 5 + 5؟ 🔢",
            options: ["10", "15", "20"],
            correct: 0
        },
        {
            question: "كم عدد أيام الأسبوع؟ 📅",
            options: ["5 أيام", "6 أيام", "7 أيام"],
            correct: 2
        },
        {
            question: "كم عدد حكام المملكة العربية السعودية؟ 👑",
            options: ["5 حكام", "7 حكام", "9 حكام"],
            correct: 1
        },
        {
            question: "كم عدد فصول السنة؟ 🌦️",
            options: ["4 فصول", "3 فصول", "فصلين"],
            correct: 0
        },
        {
            question: "ما هو أكبر كوكب في المجموعة الشمسية؟ 🪐",
            options: ["الأرض", "المريخ", "المشتري"],
            correct: 2
        },
        {
            question: "كم عدد أركان الإسلام؟ 🕋",
            options: ["4 أركان", "5 أركان", "6 أركان"],
            correct: 1
        },
        {
            question: "ما هو ناتج ضرب 6 * 6؟ ✖️",
            options: ["12", "30", "36"],
            correct: 2
        }
    ];

    let currentIdx = 0;
    let score = 0;

    function loadQuestion() {
        const qBox = document.getElementById('options-box');
        const qText = document.getElementById('q-text');
        const resBox = document.getElementById('result');
        const nextBtn = document.getElementById('next-btn');
        
        resBox.innerText = "";
        qBox.innerHTML = "";
        nextBtn.style.display = "none";
        
        let currentQ = quizData[currentIdx];
        qText.innerText = currentQ.question;

        currentQ.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.classList.add('options-btn');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, index);
            qBox.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, selectedIndex) {
        const allButtons = document.querySelectorAll('.options-btn');
        const correctIndex = quizData[currentIdx].correct;
        const resBox = document.getElementById('result');
        const nextBtn = document.getElementById('next-btn');

        allButtons.forEach(btn => btn.disabled = true);

        if (selectedIndex === correctIndex) {
            score++;
            selectedBtn.classList.add('correct');
            resBox.innerText = "أحسنت! إجابة صحيحة 🌟";
            resBox.style.color = "#27ae60";
        } else {
            selectedBtn.classList.add('wrong');
            allButtons[correctIndex].classList.add('correct');
            resBox.innerText = "حاول مرة أخرى 🎈";
            resBox.style.color = "#e74c3c";
        }
        nextBtn.style.display = "inline-block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            loadQuestion();
        } else {
            showScore();
        }
    }

    function showScore() {
        document.getElementById('quiz').innerHTML = `
            <h2>انتهت المسابقة! 🎉</h2>
            <p style="font-size: 1.5rem;">نتيجتك هي:</p>
            <p style="font-size: 3rem; color: #27ae60; font-weight: bold;">${score} من ${quizData.length}</p>
            <button onclick="location.reload()" class="options-btn" style="background:#2c3e50; color:white;">العب مرة أخرى</button>
        `;
    }

    loadQuestion();
</script>

</body>
</html>
